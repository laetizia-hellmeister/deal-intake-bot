name: Promote Inbound Deals to Pipeline

on:
  schedule:
    # Twice daily: 12:00 + 17:30 Europe/Copenhagen.
    # GitHub cron is UTC only, so each local target needs both a CEST
    # (UTC+2, summer) and a CET (UTC+1, winter) entry. The script gates
    # on local hour and exits silently on the schedules that didn't map
    # to a target window for the current DST state.
    - cron: '0 10 * * *'   # 12:00 CEST
    - cron: '0 11 * * *'   # 12:00 CET
    - cron: '30 15 * * *'  # 17:30 CEST
    - cron: '30 16 * * *'  # 17:30 CET
  workflow_dispatch:

jobs:
  promote:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: pip install -r requirements.txt
      - run: python scripts/promote.py
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          ATTIO_API_KEY: ${{ secrets.ATTIO_API_KEY }}
